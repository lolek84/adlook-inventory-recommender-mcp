services:
  - type: web
    name: adlook-inventory-recommender-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        generateValue: false
      - key: INVENTORY_DIR
        value: .
      - key: INVENTORY_FILE
        value: inventory_db_20260512.csv
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: HISTORY_FILE
        value: campaign_history_db_20260514.csv
    healthCheckPath: /mcp

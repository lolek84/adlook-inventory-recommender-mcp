services:
  - type: web
    name: adlook-inventory-recommender-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        generateValue: false
      - key: INVENTORY_DIR
        value: .
      - key: INVENTORY_FILE
        value: inventory_20251005_20260402_with_country.csv
    healthCheckPath: /mcp
